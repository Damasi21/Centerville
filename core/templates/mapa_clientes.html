{% extends "base.html" %}
{% load static %}

{% block title %}Mapa de Clientes{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/mapa.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold mb-0">Mapa de Clientes</h3>

        <a href="{% url 'index' %}" class="btn btn-outline-dark">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <!-- FILTROS -->
            <div class="row g-2 align-items-end mb-3">
                <div class="col-md-4">
                    <label class="form-label">Filtrar por Segmentação</label>
                    <select id="filtroSegmentacao" class="form-select">
                        <option value="">Todos</option>
                    </select>
                </div>

                <div class="col-md-5">
                    <label class="form-label">Buscar cidade (qualquer)</label>
                    <div class="input-group">
                    <input id="buscaCidade"
                            class="form-control"
                            type="text"
                            placeholder="Digite a cidade (ex: Cuiabá, MT)">
                    <button class="btn btn-outline-secondary" type="button" id="btnBuscarCidade">
                        <i class="bi bi-search"></i>
                    </button>
                    </div>
                </div>

                <div class="col-md-3 d-flex gap-2">
                    <button class="btn btn-primary w-50" id="btnAplicarFiltros">Aplicar</button>
                    <button class="btn btn-outline-secondary w-50" id="btnLimparFiltros">Limpar</button>
                </div>
            </div>

            <div id="map"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ block.super }}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="{% static 'js/mapa.js' %}"></script>

{% endblock %}
