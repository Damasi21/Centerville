{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Centerville</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #d7a73f;
      --gold-light: #f2c15f;
      --gold-dark: #8e6821;
      --black: #050505;
      --ink: #111111;
      --white: #f7f2e8;
      --muted: #b9b1a4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Montserrat", sans-serif;
      color: #111111;
      background:
        radial-gradient(circle at 50% 15%, rgba(215, 167, 63, 0.22), transparent 28%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.035) 25%, transparent 25%) 0 0 / 28px 28px,
        linear-gradient(225deg, rgba(255, 255, 255, 0.028) 25%, transparent 25%) 0 0 / 28px 28px,
        linear-gradient(180deg, #171717 0%, #050505 100%);
      display: grid;
      place-items: center;
      overflow-x: hidden;
      padding: 28px 18px;
    }

    .login-shell {
      width: min(100%, 420px);
      min-height: 660px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .login-shell::before,
    .login-shell::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(6px);
      pointer-events: none;
    }

    .login-shell::before {
      width: 230px;
      height: 230px;
      border: 1px solid rgba(215, 167, 63, 0.22);
      top: 32px;
      right: -78px;
    }

    .login-shell::after {
      width: 170px;
      height: 170px;
      background: rgba(215, 167, 63, 0.08);
      bottom: 48px;
      left: -70px;
    }

    .login-card {
      width: 100%;
      padding: 40px 28px 34px;
      border: 1px solid rgba(215, 167, 63, 0.32);
      border-radius: 32px;
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.018)),
        rgba(5, 5, 5, 0.78);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.62),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
      animation: cardIn 700ms ease both;
    }

    .brand {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand-mark {
      width: 108px;
      height: 108px;
      margin: 0 auto 16px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      background: radial-gradient(circle, rgba(215, 167, 63, 0.18), rgba(0, 0, 0, 0.72));
      display: grid;
      place-items: center;
      box-shadow: 0 0 35px rgba(215, 167, 63, 0.26);
      overflow: hidden;
    }

    .brand-mark img {
      width: 82%;
      height: 82%;
      object-fit: contain;
    }

    .member-title {
      font-size: 1.24rem;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 800;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.7);
    }

    .member-subtitle {
      color: var(--muted);
      font-size: 0.76rem;
      margin-top: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .messages {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 16px;
      color: #ffe5e5;
      background: rgba(150, 24, 24, 0.32);
      border: 1px solid rgba(255, 144, 144, 0.25);
      font-size: 0.78rem;
      text-align: center;
    }

    .login-form {
      display: grid;
      gap: 17px;
    }

    .input-wrap {
      min-height: 48px;
      border: 3px solid var(--white);
      border-radius: 999px;
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      overflow: hidden;
    }

    .input-wrap:focus-within {
      border-color: var(--gold-light);
      box-shadow: 0 0 0 4px rgba(215, 167, 63, 0.16), 0 16px 34px rgba(0, 0, 0, 0.42);
      transform: translateY(-1px);
    }

    .input-icon {
      width: 38px;
      height: 38px;
      margin-left: 4px;
      border: 2px solid var(--white);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--white);
    }

    .input-icon svg {
      width: 19px;
      height: 19px;
    }

    .input-wrap input {
      width: 100%;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--white);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0 18px 0 10px;
      border-radius: 0 999px 999px 0;
      appearance: none;
    }

    .input-wrap input:-webkit-autofill,
    .input-wrap input:-webkit-autofill:hover,
    .input-wrap input:-webkit-autofill:focus {
      -webkit-text-fill-color: #111111;
      caret-color: #111111;
      box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.2) inset;
      transition: background-color 9999s ease-in-out 0s;
    }

    .input-wrap input::placeholder {
      color: rgba(247, 242, 232, 0.86);
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 2px 8px 14px;
      font-size: 0.72rem;
      color: var(--white);
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .remember input {
      width: 13px;
      height: 13px;
      accent-color: var(--gold);
    }

    .forgot-link,
    .create-link {
      color: var(--white);
      text-decoration-color: rgba(247, 242, 232, 0.6);
      text-underline-offset: 3px;
      transition: color 180ms ease, text-decoration-color 180ms ease;
    }

    .forgot-link:hover,
    .create-link:hover {
      color: var(--gold-light);
      text-decoration-color: var(--gold-light);
    }

    .login-button {
      width: 72%;
      min-height: 48px;
      margin: 12px auto 0;
      border: 0;
      border-radius: 999px;
      color: #15100a;
      background: linear-gradient(180deg, var(--gold-light), var(--gold));
      box-shadow: 0 16px 30px rgba(215, 167, 63, 0.25);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 36px rgba(215, 167, 63, 0.34);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .signup {
      margin-top: 34px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--white);
    }

    .signup p {
      margin-bottom: 8px;
    }

    .create-link {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(247, 242, 232, 0.86);
      border-radius: 999px;
      padding: 0 18px;
      text-decoration: none;
      font-weight: 700;
      background: rgba(0, 0, 0, 0.16);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 460px) {
      body {
        padding: 18px 12px;
      }

      .login-shell {
        min-height: auto;
      }

      .login-card {
        padding: 32px 20px 28px;
        border-radius: 26px;
      }

      .brand-mark {
        width: 94px;
        height: 94px;
      }

      .form-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .login-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <div class="brand">
        <div class="brand-mark">
          <img src="/media/md21.png" alt="Logo MD21">
        </div>
        <h1 class="member-title" id="login-title">Member Login</h1>
        <p class="member-subtitle">Centerville Access</p>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="messages">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form class="login-form" method="POST" action="{% url 'tela_login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">

        <label class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </span>
          <input type="text" name="username" autocomplete="username" placeholder="Username" required>
        </label>

        <label class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="10" rx="2"></rect>
              <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
            </svg>
          </span>
          <input type="password" name="password" autocomplete="current-password" placeholder="Password" required>
        </label>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox" name="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button class="login-button" type="submit">Login</button>
      </form>

      <div class="signup">
        <p>Not a member?</p>
        {% if can_create_first_user %}
          <a class="create-link" href="{% url 'usuario_novo' %}">Create account</a>
        {% else %}
          <a class="create-link" href="#">Create account</a>
        {% endif %}
      </div>
    </section>
  </main>
</body>
</html>
