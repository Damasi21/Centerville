{% extends "base.html" %}
{% load static %}

{% block title %}Configurações - Centerville{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3 class="fw-bold mb-4 text-secondary">Configurações</h3>

    <div class="row justify-content-start">

        <!-- Card Segmentação -->
        <div class="col-md-2 mb-3">
            <a href="{% url 'segmentacao_list' %}" class="text-decoration-none text-dark">
                <div class="card shadow-sm border-0 h-100 hover-card">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center">
                        <img src="/media/segmentacao.png" alt="Segmentação"
                             class="img-fluid mb-3" style="max-height: 64px;">
                        <h5 class="fw-bold">Segmentação</h5>
                    </div>
                </div>
            </a>
        </div>

        <!-- Card Status -->
        <div class="col-md-2 mb-3   ">
            <a href="{% url 'origemcliente_list' %}" class="text-decoration-none text-dark">
                <div class="card shadow-sm border-0 h-100 hover-card">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center">
                        <img src="/media/status.png" alt="Status"
                             class="img-fluid mb-3" style="max-height: 64px;">
                        <h5 class="fw-bold">Origem</h5>
                    </div>
                </div>
            </a>
        </div>

    </div>
</div>
{% endblock %}
